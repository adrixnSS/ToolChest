name: Despliegue automatico a DigitalOcean

on:
  push:
    branches: [ "main" ] # Cambia "main" por "master" si tu rama principal se llama master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Conectarse al servidor y actualizar
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd ~/file-converter-pro
          git pull origin main
          npm install
          npm run
          pm2 restart toolchest
